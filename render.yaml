services:
  - type: web
    name: bloom-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt && python -c \"import nltk; nltk.download('vader_lexicon')\""
    # --proxy-headers/--forwarded-allow-ips: Render sits behind a proxy, so
    # uvicorn must trust X-Forwarded-For to see real client IPs. Without this,
    # every request looks like it comes from the same address and the
    # slowapi rate limits (login, signup, chat, etc.) would apply globally
    # instead of per-client.
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips=*"
    healthCheckPath: /health
    envVars:
      # Pin a stable interpreter. (Python 3.14 was observed to have
      # intermittent TLS handshake failures against MongoDB Atlas during
      # local development on Windows; 3.12 is well-tested with PyMongo/Motor.)
      - key: PYTHON_VERSION
        value: 3.12.7

      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: bloom
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: EMAIL_VERIFICATION_EXPIRE_HOURS
        value: "24"

      # Set to your deployed Vercel URL (e.g. https://bloom-app.vercel.app)
      - key: FRONTEND_URL
        sync: false
      # Optional: comma-separated extra origins (e.g. a custom domain)
      - key: CORS_ALLOWED_ORIGINS
        sync: false
