services:
  - type: web
    name: bloom-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    # Build and start commands now live in backend/Dockerfile instead of here.
    # --proxy-headers/--forwarded-allow-ips (baked into the Dockerfile CMD):
    # Render sits behind a proxy, so uvicorn must trust X-Forwarded-For to see
    # real client IPs. Without this, every request looks like it comes from
    # the same address and the slowapi rate limits (login, signup, chat,
    # etc.) would apply globally instead of per-client.
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production

      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: bloom
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

      - key: GOOGLE_CLIENT_ID
        sync: false

      # Brevo HTTP API (not SMTP) -- see https://app.brevo.com > Settings > API Keys
      - key: BREVO_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: FROM_NAME
        value: BLOOM
      - key: EMAIL_VERIFICATION_EXPIRE_HOURS
        value: "24"

      # Set to your deployed Vercel URL (e.g. https://bloom-app.vercel.app)
      - key: FRONTEND_URL
        sync: false
      # Optional: comma-separated extra origins (e.g. a custom domain)
      - key: CORS_ALLOWED_ORIGINS
        sync: false
